value_verification:
  methodology_id: valuation_verified-operational-effect-v1
  methodology_version: "1.0.0"

  components:
    - component_id: vcomponent_avoided-downtime-001
      effect_type: cost_avoidance
      description: >
        Avoided emergency spindle failure and unplanned production downtime by
        performing inspection and bearing replacement at the next controlled
        production transition.
      value:
        currency: JPY
        amount: 1000000
      verification_status: verified
      inclusion_status: included
      measurement_method: >
        Comparison of the approved maintenance event with the standard cost of
        an unplanned spindle failure, including emergency labor, lost machine
        hours, and expedited replacement logistics.
      evidence_references:
        - internal://finance/cost-model/unplanned-spindle-failure-v3
        - internal://maintenance/inspection-result/spindle-a17-001
        - internal://production/machine-hours/spindle-a17-20260716
      exclusion_reason: null

    - component_id: vcomponent_quality-containment-001
      effect_type: quality_improvement
      description: >
        Avoided downstream inspection, rework, and customer-return exposure by
        holding and verifying the affected production lot before release.
      value:
        currency: JPY
        amount: 250000
      verification_status: verified
      inclusion_status: included
      measurement_method: >
        Confirmed cost of the contained lot compared with the documented
        reinspection and rework cost that would have occurred after release.
      evidence_references:
        - internal://quality/lot-disposition/lot-20260716-L3-04
        - internal://finance/cost-model/quality-escape-v2
      exclusion_reason: null

    - component_id: vcomponent_reputation-protection-001
      effect_type: risk_reduction
      description: >
        Possible reduction in future customer trust or reputation damage from a
        quality escape.
      value:
        currency: JPY
        amount: 500000
      verification_status: estimated
      inclusion_status: excluded
      measurement_method: >
        Scenario estimate based on historical customer-response patterns. The
        effect was not directly observable in this case.
      evidence_references:
        - internal://risk/scenarios/quality-reputation-impact-v1
      exclusion_reason: >
        The effect is plausible but not directly verified and therefore cannot
        enter the v0.5 return pool.

  gross_verified_value:
