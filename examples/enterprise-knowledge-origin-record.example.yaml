  title: Early spindle bearing failure detection by vibration pattern
  origin_type: combined_origin
  description: >
    A diagnostic practice developed through repeated observation by
    experienced machining technicians. The practice identifies an early
    spindle-bearing failure risk from a combination of vibration frequency,
    sound changes, tool marks, and recent maintenance history.
  first_observed_at: "2018-04-01T00:00:00+09:00"

