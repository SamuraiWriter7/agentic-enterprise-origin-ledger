    - agent_assisted_capture

  purpose: >
    Preserve the origin and operational boundaries of the diagnostic
    practice before converting it into an AI-agent skill for predictive
    maintenance support.

  limitations:
    - >
      The practice was developed primarily for spindle models used in
      Plant A and has not been fully tested on other equipment families.
    - >
      Diagnosis depends partly on contextual signals that may not be
      represented in vibration sensor data alone.
    - >
      The practice must not be treated as a replacement for an authorized
      mechanical inspection.

  capture_environment: >
    Knowledge was captured during a structured interview, shop-floor
    observation, and review of historical maintenance records.

knowledge_summary:
  abstract: >
    When a specific high-frequency vibration increase appears together
    with irregular cutting marks and a recent lubrication anomaly, the
    spindle should be flagged for an accelerated mechanical inspection.

  operational_scope:
    - CNC machining centers operated at Plant A
    - Predictive maintenance triage
    - Internal technician training
    - Maintenance scheduling support

  decision_contexts:
    - Detecting possible spindle-bearing degradation
    - Prioritizing inspection requests
    - Reviewing abnormal vibration alerts
    - Comparing sensor alerts with technician observations

  known_limitations:
    - The rule is not validated for all spindle manufacturers.
    - False positives may occur after tool replacement.
    - Sensor calibration errors can distort vibration patterns.
    - Final shutdown decisions require human authorization.

  excluded_uses:
    - Fully autonomous shutdown of production equipment
    - External sale of the diagnostic method
    - Employee performance evaluation
    - Safety certification without engineering review

  confidence: high

