aggregate_attribution:
  basis: |-
    Confirmed human relative weights plus explicitly unattributed shared
    organizational contribution are normalized to 1.0 for the scoped outcomes.
  total_relative_weight: 1.0
  unattributed_weight: 0.08
  human_contribution_complete: false
  calculation_status: reviewed
  allocation_readiness: provisional

  checks:
    - check_type: dimension_weights
      result: pass
      notes: Methodology dimension weights sum to 1.0.

    - check_type: relative_weights
      result: pass
      notes: >
        Confirmed human relative weights sum to 0.92; with 0.08 unattributed
        weight, the total is 1.0.

    - check_type: evidence_coverage
      result: pass
      notes: >
        Every contribution event references an origin, binding, trace, or
        supporting evidence item.

    - check_type: causal_consistency
      result: pass
      notes: >
        Counterfactual claims are consistent with the recorded execution route
        and authority boundaries.

    - check_type: duplicate_claims
      result: warning
      notes: |-
        Origin discovery and evidence corroboration are interdependent; shares
        were separated by causal role rather than treated as duplicate
        ownership.

    - check_type: permission_compliance
