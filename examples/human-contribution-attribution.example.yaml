    Attribute human contributions that made the spindle-anomaly origin,
    agent skill, cross-department execution, and controlled operational
    outcome possible.
  period:
    start_at: "2018-04-01T00:00:00+09:00"
    end_at: "2026-07-16T10:24:00+09:00"
  outcome_scope:
    - Human-approved spindle inspection at the next safe production transition.
    - Temporary hold of the potentially affected production lot.
    - Preservation of origin, attribution, and human authority across the workflow.
  monetary_allocation_in_scope: false
  decision_context: |-
    This record prepares evidence-weighted contribution shares for later
    value-return analysis. It does not determine pay, ownership, liability,
    or royalty settlement.

lineage:
  origin_record_id: ekor_spindle-vibration-001
  origin_id: origin_spindle-vibration-001
  skill_binding_id: kasb_spindle-diagnosis-001
  execution_trace_ids:
    - cdet_spindle-anomaly-20260716-001
  trace_integrities:
    - trace_id: cdet_spindle-anomaly-20260716-001
      integrity:
        algorithm: sha256
        digest: 1e675055eb4fcf1ea0b71e26c59a69d7486010f6bc8f70c0b725b195831ec0af
        signed_by: enterprise-execution-trace-service
  outcome_references:
    - internal://maintenance/inspection-request/spindle-a17-001
    - internal://quality/lot-hold/lot-20260716-L3-04
    - internal://trace/spindle-a17/final-report-001

methodology:
  method_id: method_evidence-weighted-causal-v1
  method_version: "1.0.0"
  method_type: evidence_weighted_causal_attribution
  normalization_basis: per_outcome
  counterfactual_required: true
  evidence_threshold: corroborated

  dimensions:
    - dimension_id: origin_novelty
      weight: 0.2
      description: >
        Measures creation or discovery of the knowledge origin used by the
        enterprise workflow.

    - dimension_id: domain_expertise
      weight: 0.15
      description: >
        Measures specialized expertise required to interpret the operational
        context.

    - dimension_id: contextual_judgment
      weight: 0.2
      description: >
        Measures situation-specific judgment that could not be safely reduced
        to a generic rule.

    - dimension_id: corrective_action
      weight: 0.15
      description: >
        Measures correction, override, or redirection of an agent or workflow
        output.

    - dimension_id: authorization_responsibility
      weight: 0.15
      description: >
        Measures accountable authority exercised over consequential decisions.

    - dimension_id: outcome_validation
      weight: 0.1
      description: >
        Measures confirmation that the claimed outcome or effect is supported
        by evidence.

    - dimension_id: stewardship
      weight: 0.05
      description: >
        Measures preservation, governance, review, and maintenance of reusable
        enterprise knowledge.

  rounding_precision: 2

  limitations:
    - >
      Relative weights represent documented contribution to the scoped
      outcome, not total employee value.
    - >
      Shared organizational infrastructure and incomplete historical evidence
      remain partly unattributed.
    - >
      Counterfactual assessments are reviewable judgments rather than
      experimentally proven causal estimates.
    - >
      The record must not be reused as a general employee ranking or
      productivity score.

